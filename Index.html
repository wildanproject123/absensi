<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Guru & Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Pustaka PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app">
        <!-- Rendered by JavaScript -->
    </div>

    <script>
        // Data Mockup / Initial State
        let state = {
            currentUser: null, // { id, role, name, lat, lng }
            users: [
                { id: 'admin1', username: 'admin', password: '123', role: 'admin', name: 'Administrator Utama' },
                { id: 'guru1', username: 'guru1', password: '123', role: 'guru', name: 'Budi Santoso, S.Pd', targetLat: -6.2088, targetLng: 106.8456, radius: 100 },
                { id: 'guru2', username: 'guru2', password: '123', role: 'guru', name: 'Siti Aminah, M.Pd', targetLat: -6.1754, targetLng: 106.8272, radius: 100 }
            ],
            attendance: [
                { id: 1, userId: 'guru1', name: 'Budi Santoso, S.Pd', type: 'Hadir', time: '07:15', date: new Date().toLocaleDateString('id-ID'), note: '-' },
            ]
        };

        const app = document.getElementById('app');

        // Utils
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // in metres
        }

        function showNotification(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 text-white transition-all transform translate-y-0 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Export PDF Function
        function downloadRekapanPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const today = new Date();
            const dateStr = today.toLocaleDateString('id-ID', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            // Judul/Kop Surat
            doc.setFontSize(18);
            doc.text("SMP NEGERI 4 MONTA", 105, 15, { align: "center" });
            doc.setFontSize(11);
            doc.text("Laporan Rekapitulasi Absensi Guru", 105, 22, { align: "center" });
            doc.text(`Tanggal: ${dateStr}`, 105, 28, { align: "center" });
            doc.line(20, 32, 190, 32);

            // Filter data hari ini
            const todayFormatted = today.toLocaleDateString('id-ID');
            const data = state.attendance
                .filter(a => a.date === todayFormatted)
                .map((row, index) => [
                    index + 1,
                    row.name,
                    row.type,
                    row.time,
                    row.note
                ]);

            // Tabel
            doc.autoTable({
                startY: 40,
                head: [['No', 'Nama Guru', 'Status', 'Waktu', 'Keterangan']],
                body: data.length > 0 ? data : [['-', 'Tidak ada data', '-', '-', '-']],
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229] }, // Indigo 600
                styles: { fontSize: 9 }
            });

            // Footer
            const finalY = doc.lastAutoTable.finalY || 40;
            doc.setFontSize(10);
            doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 20, finalY + 10);

            doc.save(`Absensi_SMPN4MONTA_${todayFormatted.replace(/\//g, '-')}.pdf`);
            showNotification("PDF berhasil diunduh");
        }

        // Views
        function renderLogin() {
            app.innerHTML = `
                <div class="flex items-center justify-center min-h-screen p-4">
                    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white text-2xl">
                                <i class="fas fa-id-card-clip"></i>
                            </div>
                            <h1 class="text-2xl font-bold text-slate-800">Absensi Digital</h1>
                            <p class="text-slate-500 text-sm mt-1">Silahkan masuk ke akun Anda</p>
                        </div>
                        <form id="loginForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                                <input type="text" id="username" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="admin / guru1" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                                <input type="password" id="password" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="123" required>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition-colors">Masuk Sekarang</button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').onsubmit = (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const user = state.users.find(x => x.username === u && x.password === p);
                if (user) {
                    state.currentUser = user;
                    renderDashboard();
                } else {
                    showNotification('Username atau password salah', 'error');
                }
            };
        }

        function renderDashboard() {
            const user = state.currentUser;
            if (user.role === 'admin') {
                renderAdminDashboard();
            } else {
                renderGuruDashboard();
            }
        }

        function renderAdminDashboard() {
            const today = new Date().toLocaleDateString('id-ID');
            const todayLogs = state.attendance.filter(a => a.date === today);
            
            app.innerHTML = `
                <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-shield-halved text-indigo-600 text-xl"></i>
                        <span class="font-bold text-slate-800 text-lg">Admin Panel</span>
                    </div>
                    <button onclick="logout()" class="text-slate-500 hover:text-rose-600 flex items-center gap-2 text-sm font-medium">
                        Keluar <i class="fas fa-sign-out-alt"></i>
                    </button>
                </nav>

                <main class="p-6 max-w-7xl mx-auto space-y-6">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">SMP NEGERI 4 MONTA</h2>
                            <p class="text-slate-500 text-sm">Dashboard Monitoring Kehadiran Guru</p>
                        </div>
                        <button onclick="downloadRekapanPDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-semibold flex items-center gap-2 shadow-lg shadow-indigo-100 transition-all">
                            <i class="fas fa-file-pdf"></i> Cetak Rekapan Hari Ini
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">Guru Hadir Hari Ini</p>
                            <h3 class="text-3xl font-bold text-indigo-600">${todayLogs.filter(l => l.type === 'Hadir').length}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">Izin / Sakit</p>
                            <h3 class="text-3xl font-bold text-amber-500">${todayLogs.filter(l => l.type !== 'Hadir').length}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">Total Guru</p>
                            <h3 class="text-3xl font-bold text-slate-800">${state.users.filter(u => u.role === 'guru').length}</h3>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Monitoring section -->
                        <section class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                <h4 class="font-bold text-slate-700">Monitor Absen Real-time</h4>
                                <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full font-semibold">${today}</span>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                                        <tr>
                                            <th class="px-4 py-3">Guru</th>
                                            <th class="px-4 py-3">Status</th>
                                            <th class="px-4 py-3">Waktu</th>
                                            <th class="px-4 py-3">Ket</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${todayLogs.length ? todayLogs.map(log => `
                                            <tr class="hover:bg-slate-50">
                                                <td class="px-4 py-3 font-medium text-slate-700">${log.name}</td>
                                                <td class="px-4 py-3">
                                                    <span class="px-2 py-1 rounded text-xs font-bold ${log.type === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                                                        ${log.type}
                                                    </span>
                                                </td>
                                                <td class="px-4 py-3 text-slate-500 text-sm">${log.time}</td>
                                                <td class="px-4 py-3 text-slate-500 text-sm">${log.note}</td>
                                            </tr>
                                        `).join('') : `<tr><td colspan="4" class="p-8 text-center text-slate-400">Belum ada data hari ini</td></tr>`}
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        <!-- Create User section -->
                        <section class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                            <h4 class="font-bold text-slate-700 mb-4">Manajemen Akun Guru & Zona Absen</h4>
                            <form id="addUserForm" class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="text" id="newName" placeholder="Nama Lengkap" class="border p-2 rounded w-full" required>
                                    <input type="text" id="newUsername" placeholder="Username" class="border p-2 rounded w-full" required>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="password" id="newPassword" placeholder="Password" class="border p-2 rounded w-full" required>
                                    <input type="number" step="any" id="newLat" placeholder="Latitude (Titik Absen)" class="border p-2 rounded w-full" required>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="number" step="any" id="newLng" placeholder="Longitude (Titik Absen)" class="border p-2 rounded w-full" required>
                                    <input type="number" id="newRadius" placeholder="Radius (Meter)" class="border p-2 rounded w-full" value="100" required>
                                </div>
                                <p class="text-[10px] text-slate-400">Contoh Koordinat Monas: -6.1754, 106.8272</p>
                                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Simpan Akun Guru</button>
                            </form>

                            <div class="mt-6 border-t pt-4">
                                <h5 class="text-sm font-bold text-slate-600 mb-3">Daftar Guru Terdaftar</h5>
                                <div class="space-y-2 max-h-48 overflow-y-auto pr-2">
                                    ${state.users.filter(u => u.role === 'guru').map(u => `
                                        <div class="flex justify-between items-center text-sm p-2 bg-slate-50 rounded">
                                            <span>${u.name}</span>
                                            <span class="text-[10px] bg-slate-200 px-2 py-1 rounded">R: ${u.radius}m</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </section>
                    </div>
                </main>
            `;

            document.getElementById('addUserForm').onsubmit = (e) => {
                e.preventDefault();
                const newUser = {
                    id: 'guru' + Date.now(),
                    name: document.getElementById('newName').value,
                    username: document.getElementById('newUsername').value,
                    password: document.getElementById('newPassword').value,
                    role: 'guru',
                    targetLat: parseFloat(document.getElementById('newLat').value),
                    targetLng: parseFloat(document.getElementById('newLng').value),
                    radius: parseInt(document.getElementById('newRadius').value)
                };
                state.users.push(newUser);
                showNotification('Akun guru berhasil ditambahkan');
                renderAdminDashboard();
            };
        }

        function renderGuruDashboard() {
            const user = state.currentUser;
            const myLogs = state.attendance.filter(a => a.userId === user.id);
            const today = new Date().toLocaleDateString('id-ID');
            const hasCheckedIn = myLogs.some(l => l.date === today);

            app.innerHTML = `
                <nav class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                    <div>
                        <p class="text-xs opacity-80 uppercase tracking-widest font-bold">Halo, Guru</p>
                        <h2 class="font-bold text-lg">${user.name}</h2>
                    </div>
                    <button onclick="logout()" class="bg-white/10 hover:bg-white/20 p-2 rounded-lg transition-colors">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </nav>

                <main class="p-6 max-w-2xl mx-auto space-y-6">
                    <!-- Geolocation Status -->
                    <div id="geoCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center space-y-4">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto">
                            <i class="fas fa-location-dot text-slate-400 text-2xl" id="geoIcon"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-800">Cek Lokasi Anda</h3>
                            <p class="text-slate-500 text-sm" id="geoText">Sistem perlu memverifikasi lokasi Anda sebelum absen.</p>
                        </div>
                        
                        ${!hasCheckedIn ? `
                        <div class="flex flex-col gap-3">
                            <button id="btnHadir" onclick="processAbsensi('Hadir')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-check-circle"></i> Absen Hadir Di Lokasi
                            </button>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="showAbsenModal('Izin')" class="bg-amber-400 hover:bg-amber-500 text-white font-bold py-3 rounded-xl transition-all">Izin</button>
                                <button onclick="showAbsenModal('Sakit')" class="bg-rose-400 hover:bg-rose-500 text-white font-bold py-3 rounded-xl transition-all">Sakit</button>
                            </div>
                        </div>
                        ` : `
                        <div class="bg-emerald-50 text-emerald-600 p-4 rounded-xl border border-emerald-100">
                            <i class="fas fa-check-double mb-2 text-2xl"></i>
                            <p class="font-bold">Anda sudah absen hari ini</p>
                            <p class="text-xs">Terima kasih atas dedikasi Anda!</p>
                        </div>
                        `}
                    </div>

                    <!-- Rekapan -->
                    <section class="space-y-4">
                        <h4 class="font-bold text-slate-700 px-1 flex items-center gap-2">
                            <i class="fas fa-history text-indigo-600"></i> Riwayat Kehadiran Anda
                        </h4>
                        <div class="space-y-3">
                            ${myLogs.length ? myLogs.reverse().map(log => `
                                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex justify-between items-center">
                                    <div>
                                        <p class="font-bold text-slate-800">${log.type}</p>
                                        <p class="text-xs text-slate-400">${log.date} - ${log.time}</p>
                                    </div>
                                    <span class="text-xs text-slate-500 italic bg-slate-50 px-2 py-1 rounded">Ket: ${log.note}</span>
                                </div>
                            `).join('') : '<p class="text-center text-slate-400 py-8">Belum ada riwayat</p>'}
                        </div>
                    </section>
                </main>

                <!-- Modal Izin/Sakit -->
                <div id="modalAbsen" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
                    <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4">
                        <h3 id="modalTitle" class="text-xl font-bold text-slate-800">Alasan Izin</h3>
                        <textarea id="modalNote" class="w-full border p-3 rounded-xl h-32 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Berikan keterangan singkat..."></textarea>
                        <div class="flex gap-2">
                            <button onclick="closeModal()" class="flex-1 py-2 text-slate-500 font-bold">Batal</button>
                            <button id="modalSubmit" class="flex-1 py-2 bg-indigo-600 text-white rounded-lg font-bold">Kirim</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function showAbsenModal(type) {
            const modal = document.getElementById('modalAbsen');
            const title = document.getElementById('modalTitle');
            const submit = document.getElementById('modalSubmit');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            title.innerText = 'Keterangan ' + type;
            submit.onclick = () => {
                const note = document.getElementById('modalNote').value || '-';
                if (!note || note === '-') return showNotification('Isi keterangan dulu', 'error');
                processAbsensi(type, note);
                closeModal();
            };
        }

        function closeModal() {
            const modal = document.getElementById('modalAbsen');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function processAbsensi(type, note = '-') {
            const user = state.currentUser;
            const btn = document.getElementById('btnHadir');
            
            if (type === 'Hadir') {
                if (!navigator.geolocation) {
                    return showNotification('GPS tidak didukung di perangkat ini', 'error');
                }
                
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memverifikasi Lokasi...';
                
                navigator.geolocation.getCurrentPosition((pos) => {
                    const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, user.targetLat, user.targetLng);
                    
                    if (dist <= user.radius) {
                        saveAttendance(type, note);
                        showNotification('Berhasil! Anda berada di zona absen.');
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-check-circle"></i> Absen Hadir Di Lokasi';
                        showNotification(`Gagal! Anda berada ${Math.round(dist - user.radius)}m di luar zona.`, 'error');
                    }
                }, (err) => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> Absen Hadir Di Lokasi';
                    showNotification('Gagal mendapatkan lokasi. Izinkan akses GPS.', 'error');
                }, { enableHighAccuracy: true });
            } else {
                saveAttendance(type, note);
                showNotification(`Laporan ${type} terkirim`);
            }
        }

        function saveAttendance(type, note) {
            const now = new Date();
            state.attendance.push({
                id: Date.now(),
                userId: state.currentUser.id,
                name: state.currentUser.name,
                type: type,
                time: now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0'),
                date: now.toLocaleDateString('id-ID'),
                note: note
            });
            renderDashboard();
        }

        function logout() {
            state.currentUser = null;
            renderLogin();
        }

        // Init
        window.onload = renderLogin;

    </script>
</body>
</html>
