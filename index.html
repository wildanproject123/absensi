<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Guru Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(79, 70, 229, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
        }
        .loading-spinner {
            border: 2px solid #f3f3f3; border-top: 2px solid #4f46e5;
            border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-0 md:p-6 lg:p-10 flex flex-col items-center">

    <!-- LOGIN SECTION -->
    <div id="auth-section" class="w-full max-w-md my-auto">
        <div class="glass-card p-10 rounded-[2.5rem] shadow-xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0012 3c1.223 0 2.39.218 3.476.614m.879 1.514a10.003 10.003 0 011.082 5.878M9 6h.01M7 10h.01M13 6h.01M15 10h.01M11 14h.01M13 18h.01M7 14h.01M9 18h.01"></path></svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Portal Presensi</h1>
                <p class="text-slate-500 mt-2 font-medium italic text-sm">Real-time Cloud Monitoring</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Username" class="w-full px-6 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                <input type="password" id="login-pass" placeholder="Password" class="w-full px-6 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                <button id="btn-login" onclick="handleLogin()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-indigo-600 transition-all shadow-lg flex items-center justify-center gap-2">
                    Masuk
                </button>
                <div id="auth-msg" class="text-center text-xs font-bold text-rose-500 hidden pt-2 uppercase"></div>
            </div>
        </div>
    </div>

    <!-- APP SECTION -->
    <div id="app-section" class="w-full max-w-7xl hidden">
        <div class="flex flex-col lg:flex-row gap-6">
            
            <!-- Sidebar (Hanya untuk Admin) -->
            <div id="admin-sidebar" class="hidden lg:flex flex-col w-72 bg-slate-900 rounded-[2.5rem] p-8 text-white min-h-[600px]">
                <h2 class="text-xl font-black mb-10 text-indigo-400">ADMIN PANEL</h2>
                <nav class="space-y-3 flex-1">
                    <button onclick="switchMode('monitor')" id="tab-monitor" class="w-full text-left px-6 py-4 rounded-2xl font-bold text-sm bg-indigo-600">Monitoring</button>
                    <button onclick="switchMode('manage')" id="tab-manage" class="w-full text-left px-6 py-4 rounded-2xl font-bold text-sm hover:bg-slate-800 text-slate-400">Kelola Guru</button>
                    <button onclick="switchMode('archive')" id="tab-archive" class="w-full text-left px-6 py-4 rounded-2xl font-bold text-sm hover:bg-slate-800 text-slate-400">Link Sheets</button>
                </nav>
                <button onclick="handleLogout()" class="text-rose-400 font-bold text-sm hover:translate-x-1 transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Keluar
                </button>
            </div>

            <!-- Main Content -->
            <div class="flex-1 space-y-6">
                <header class="glass-card px-8 py-4 rounded-[2rem] flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div id="user-avatar" class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-black text-xl">?</div>
                        <div>
                            <h3 id="display-user" class="font-bold text-slate-800 leading-none">User</h3>
                            <span id="role-badge" class="text-[10px] font-bold text-slate-400 uppercase">Role</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p id="live-clock" class="text-xl font-black text-slate-800">00:00:00</p>
                        <p id="live-date" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Loading...</p>
                    </div>
                </header>

                <!-- SECTION: MONITOR -->
                <div id="section-monitor" class="hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-3xl bg-indigo-50 border-indigo-100">
                            <p class="text-[10px] font-black text-indigo-400 uppercase">Hadir</p>
                            <h4 id="stat-hadir" class="text-4xl font-black text-indigo-600">0</h4>
                        </div>
                        <div class="glass-card p-6 rounded-3xl bg-amber-50 border-amber-100">
                            <p class="text-[10px] font-black text-amber-400 uppercase">Izin/Sakit</p>
                            <h4 id="stat-izin" class="text-4xl font-black text-amber-600">0</h4>
                        </div>
                        <div class="glass-card p-6 rounded-3xl bg-slate-50 border-slate-200">
                            <p class="text-[10px] font-black text-slate-400 uppercase">Total Data</p>
                            <h4 id="stat-total" class="text-4xl font-black text-slate-800">0</h4>
                        </div>
                    </div>
                    <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-sm">
                        <div class="p-6 bg-white border-b flex justify-between items-center">
                            <h4 class="font-black text-slate-800 flex items-center gap-2">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full pulse"></span>
                                Live Presensi
                            </h4>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <tr>
                                        <th class="px-8 py-4">Waktu</th>
                                        <th class="px-8 py-4">Nama</th>
                                        <th class="px-8 py-4">Status</th>
                                        <th class="px-8 py-4">Keterangan</th>
                                    </tr>
                                </thead>
                                <tbody id="monitor-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- SECTION: GURU FORM -->
                <div id="section-guru" class="hidden max-w-xl mx-auto space-y-6 pb-10">
                    <div class="glass-card p-10 rounded-[3rem] text-center bg-indigo-600 text-white">
                        <p class="opacity-70 font-bold mb-1">Selamat Datang,</p>
                        <h2 id="guru-name" class="text-3xl font-black mb-4">Guru</h2>
                        <div class="inline-block px-8 py-4 bg-white/10 rounded-2xl">
                            <p id="clock-guru" class="text-4xl font-black">00:00:00</p>
                        </div>
                    </div>
                    <form id="absensi-form" class="glass-card p-8 rounded-[3rem] space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <label class="cursor-pointer">
                                <input type="radio" name="status" value="Hadir" checked class="peer hidden">
                                <div class="py-4 border-2 border-slate-100 rounded-2xl text-center font-black text-slate-400 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-600 transition-all">HADIR</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="status" value="Izin" class="peer hidden">
                                <div class="py-4 border-2 border-slate-100 rounded-2xl text-center font-black text-slate-400 peer-checked:border-amber-500 peer-checked:bg-amber-50 peer-checked:text-amber-500 transition-all">IZIN/SAKIT</div>
                            </label>
                        </div>
                        <textarea name="catatan" placeholder="Catatan kegiatan..." class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none h-24 font-medium"></textarea>
                        <button type="submit" id="btn-absen" class="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-xl hover:bg-indigo-600 transition-all">Kirim Presensi</button>
                    </form>
                    
                    <!-- Tombol Keluar untuk Guru -->
                    <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 py-4 px-6 rounded-2xl text-rose-500 font-bold hover:bg-rose-50 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Keluar dari Akun
                    </button>
                </div>

                <!-- SECTION: MANAGE -->
                <div id="section-manage" class="hidden max-w-md mx-auto glass-card p-10 rounded-[3rem]">
                    <h3 class="text-xl font-black text-slate-800 mb-6 text-center uppercase">Registrasi Guru</h3>
                    <div class="space-y-4">
                        <input type="text" id="reg-user" placeholder="Username" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                        <input type="password" id="reg-pass" placeholder="Password" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                        <button onclick="handleRegister()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">Simpan Akun</button>
                    </div>
                </div>

                <!-- SECTION: ARCHIVE -->
                <div id="section-archive" class="hidden glass-card rounded-[2.5rem] overflow-hidden h-[600px] flex flex-col">
                    <div class="p-4 bg-white border-b flex justify-between items-center">
                        <span class="font-bold text-sm text-slate-800">Google Sheets Archive</span>
                        <a href="https://docs.google.com/spreadsheets/d/1F9KmOe4cKFCvIbCBuaP0gWTHjjD_2OZD_mJ_JdvHOlU/edit" target="_blank" class="text-xs text-indigo-600 font-bold">Buka Full Sheet</a>
                    </div>
                    <iframe id="sheets-iframe" class="flex-1 w-full" src="about:blank"></iframe>
                </div>

            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold text-sm hidden z-[100] shadow-2xl"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Initializations
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'presensi-guru-v2';

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwASTiI47TogYU3XdIFqjtq0MxZXle6ySkMarXBf6GUWKMewZPPGtkNIrDj51r_Xxum/exec";

        let session = {
            user: localStorage.getItem('guru_user'),
            role: localStorage.getItem('guru_role'),
            pass: localStorage.getItem('guru_pass')
        };

        let userState = null;

        const withRetry = async (fn, maxRetries = 5) => {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    return await fn();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await withRetry(() => signInWithCustomToken(auth, __initial_auth_token));
                } else {
                    await withRetry(() => signInAnonymously(auth));
                }
            } catch (e) { 
                console.error("Auth initialization failed", e);
                showToast("Gagal menyambungkan ke database", "bg-rose-600");
            }
        };

        onAuthStateChanged(auth, (user) => {
            userState = user;
            if (session.user && user) showApp();
        });

        initAuth();
        initClock();

        function initClock() {
            setInterval(() => {
                const now = new Date();
                const t = now.toLocaleTimeString('id-ID', { hour12: false });
                const d = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                if(document.getElementById('live-clock')) document.getElementById('live-clock').innerText = t;
                if(document.getElementById('live-date')) document.getElementById('live-date').innerText = d;
                if(document.getElementById('clock-guru')) document.getElementById('clock-guru').innerText = t;
            }, 1000);
        }

        window.handleLogin = async () => {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const btn = document.getElementById('btn-login');

            if(!user || !pass) return showMsg("Lengkapi field!", "auth-msg");

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div>';

            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();

                if(data.status === "success") {
                    session = { user: data.username, role: data.role, pass: pass };
                    localStorage.setItem('guru_user', data.username);
                    localStorage.setItem('guru_role', data.role);
                    localStorage.setItem('guru_pass', pass);
                    showApp();
                } else {
                    showMsg(data.message, "auth-msg");
                }
            } catch (e) {
                showMsg("Gagal menghubungi server auth", "auth-msg");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Masuk";
            }
        };

        function showApp() {
            if (!userState) return;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('display-user').innerText = session.user;
            document.getElementById('role-badge').innerText = session.role;
            document.getElementById('user-avatar').innerText = (session.user?.[0] || 'G').toUpperCase();

            if (session.role === "Admin") {
                document.getElementById('admin-sidebar').classList.remove('hidden');
                switchMode('monitor');
                listenRealtime();
            } else {
                document.getElementById('guru-name').innerText = session.user;
                switchMode('guru');
            }
        }

        window.switchMode = (mode) => {
            const sections = ['monitor', 'manage', 'archive', 'guru'];
            sections.forEach(s => {
                const el = document.getElementById(`section-${s}`);
                if (el) el.classList.add('hidden');
            });
            
            const target = document.getElementById(`section-${mode}`);
            if (target) target.classList.remove('hidden');

            if(mode === 'archive') {
                document.getElementById('sheets-iframe').src = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1f6u9L_vA_k-QvUf6f0f6R-O7v0F1-X-Y-u-J-G-g-A-E-V-P-Z-T-U-X-V-P-Z-T-U/pubhtml?gid=117169048&single=true&widget=true&headers=false";
            }

            if (session.role === "Admin") {
                document.querySelectorAll('nav button').forEach(b => b.className = "w-full text-left px-6 py-4 rounded-2xl font-bold text-sm hover:bg-slate-800 text-slate-400");
                const active = document.getElementById(`tab-${mode}`);
                if(active) active.className = "w-full text-left px-6 py-4 rounded-2xl font-bold text-sm bg-indigo-600 text-white";
            }
        };

        function listenRealtime() {
            if (!userState) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'absensi');
            
            onSnapshot(colRef, (snap) => {
                const data = [];
                snap.forEach(doc => data.push(doc.data()));
                data.sort((a, b) => (b.ts_raw || 0) - (a.ts_raw || 0));

                const tbody = document.getElementById('monitor-table-body');
                tbody.innerHTML = '';
                
                let hadir = 0, izin = 0;
                data.forEach(item => {
                    if(item.status === 'Hadir') hadir++; else izin++;
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-all">
                            <td class="px-8 py-4 font-bold text-slate-400 text-xs">${item.waktu || '--:--'}</td>
                            <td class="px-8 py-4 font-black text-slate-800">${item.nama}</td>
                            <td class="px-8 py-4">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black ${item.status === 'Hadir' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'} uppercase">
                                    ${item.status}
                                </span>
                            </td>
                            <td class="px-8 py-4 text-slate-500 font-medium">${item.catatan || '-'}</td>
                        </tr>
                    `;
                });
                document.getElementById('stat-hadir').innerText = hadir;
                document.getElementById('stat-izin').innerText = izin;
                document.getElementById('stat-total').innerText = data.length;
            }, (err) => {
                console.error("Firestore error:", err);
                showToast("Gagal memuat data realtime", "bg-rose-500");
            });
        }

        document.getElementById('absensi-form').onsubmit = async (e) => {
            e.preventDefault();
            
            if (!userState) {
                showToast("Sesi belum siap, mencoba menyambungkan ulang...", "bg-amber-500");
                await initAuth();
                if (!userState) return;
            }

            const btn = document.getElementById('btn-absen');
            const formData = new FormData(e.target);
            const status = formData.get('status');
            const catatan = formData.get('catatan');
            const now = new Date();

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';

            const payload = {
                nama: session.user,
                status: status,
                catatan: catatan,
                waktu: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                ts_raw: now.getTime(),
                created_at: serverTimestamp()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'absensi');
                await withRetry(() => addDoc(colRef, payload));
                
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: "saveData",
                        user: session.user,
                        role: session.role,
                        nama: session.user,
                        pesan: `STATUS: ${status} | CAT: ${catatan}`,
                        timestamp: now.toLocaleString('id-ID')
                    })
                }).catch(() => {});

                showToast("Presensi berhasil dikirim!", "bg-emerald-600 shadow-emerald-200");
                e.target.reset();
            } catch (err) {
                console.error("Save Error:", err);
                showToast(`Gagal: ${err.code || 'Izin ditolak'}`, "bg-rose-500");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Kirim Presensi";
            }
        };

        window.handleRegister = async () => {
            const user = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            if(!user || !pass) return showToast("Lengkapi data", "bg-rose-500");

            try {
                const res = await fetch(`${SCRIPT_URL}?action=createUser&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}&role=Guru&adminUser=${session.user}&adminPass=${session.pass}`);
                const data = await res.json();
                if(data.status === "success") {
                    showToast("Guru berhasil didaftarkan", "bg-emerald-600");
                    document.getElementById('reg-user').value = '';
                    document.getElementById('reg-pass').value = '';
                } else showToast(data.message, "bg-rose-500");
            } catch (e) { showToast("Gagal register", "bg-rose-500"); }
        };

        window.handleLogout = () => { localStorage.clear(); location.reload(); };
        function showMsg(msg, id) { const el = document.getElementById(id); el.innerText = msg; el.classList.remove('hidden'); }
        function showToast(msg, bg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold text-sm z-[100] shadow-2xl transition-all ${bg}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
