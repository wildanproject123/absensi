<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMPN 4 MONTA - Elite Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F9E498;
            --gold-dark: #996515;
            --midnight: #020617;
            --card-bg: rgba(15, 23, 42, 0.75);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        
        .gold-gradient {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary), var(--gold-light));
        }
        
        .text-gold {
            background: linear-gradient(to bottom, #F9E498 0%, #D4AF37 50%, #996515 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
        }

        .btn-gold {
            background: linear-gradient(135deg, #996515, #D4AF37);
            color: #020617;
            font-weight: 800;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
            filter: brightness(1.1);
        }

        .tab-active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), transparent);
            border-bottom: 2px solid var(--gold-primary);
            color: var(--gold-primary) !important;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-content { animation: slideUp 0.5s ease-out forwards; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }

        /* Modal specific */
        .modal-overlay {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // --- DATA STATE (With LocalStorage Fallback) ---
        const INITIAL_USERS = [
            { id: 'admin1', username: 'admin', password: '123', role: 'admin', name: 'Executive Administrator' },
            { id: 'guru1', username: 'guru1', password: '123', role: 'guru', name: 'Budi Santoso, S.Pd', targetLat: -6.2088, targetLng: 106.8456, radius: 100 },
            { id: 'guru2', username: 'guru2', password: '123', role: 'guru', name: 'Siti Aminah, M.Pd', targetLat: -6.1754, targetLng: 106.8272, radius: 100 }
        ];

        let state = {
            currentUser: JSON.parse(localStorage.getItem('elite_user')) || null,
            adminActiveTab: 'overview',
            users: JSON.parse(localStorage.getItem('elite_users')) || INITIAL_USERS,
            attendance: JSON.parse(localStorage.getItem('elite_attendance')) || []
        };

        function saveState() {
            localStorage.setItem('elite_users', JSON.stringify(state.users));
            localStorage.setItem('elite_attendance', JSON.stringify(state.attendance));
            if(state.currentUser) localStorage.setItem('elite_user', JSON.stringify(state.currentUser));
            else localStorage.removeItem('elite_user');
        }

        const app = document.getElementById('app');

        // --- UTILITIES ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function notify(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full shadow-2xl z-[1000] text-[10px] font-black uppercase tracking-widest transition-all duration-500 animate-content border ${type === 'success' ? 'bg-slate-900/95 border-emerald-500/50 text-emerald-400' : 'bg-slate-900/95 border-rose-500/50 text-rose-400'}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-crown' : 'fa-shield-halved'} mr-3"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transform = 'translate(-50%, -20px)'; 
                setTimeout(() => toast.remove(), 500); 
            }, 3000);
        }

        function logout() {
            state.currentUser = null;
            saveState();
            renderLogin();
        }

        // --- AUTH & NAVIGATION ---
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            const user = state.users.find(x => x.username.toLowerCase() === u && x.password === p);
            
            if (user) {
                state.currentUser = user;
                saveState();
                renderDashboard();
            } else {
                notify('Akses Ditolak: Kredensial Ilegal', 'error');
            }
        }

        // --- CORE VIEWS ---
        function renderLogin() {
            app.innerHTML = `
                <div class="flex items-center justify-center min-h-screen p-6 relative">
                    <div class="premium-card p-10 md:p-14 w-full max-w-md border-t-2 border-t-gold-primary animate-content">
                        <div class="text-center mb-10">
                            <div class="inline-flex p-5 rounded-[2rem] bg-slate-900 border border-gold-primary/20 shadow-2xl mb-8">
                                <i class="fas fa-crown text-5xl text-gold"></i>
                            </div>
                            <h1 class="text-4xl md:text-5xl font-serif text-gold leading-tight">SMPN 4 MONTA</h1>
                            <p class="text-slate-500 text-[9px] font-bold tracking-[0.4em] uppercase mt-3">Elite Attendance Portal</p>
                        </div>
                        <form id="loginForm" class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-[9px] font-black text-gold-primary uppercase tracking-[0.2em] ml-2">Secure ID</label>
                                <input type="text" id="username" class="w-full bg-slate-950/50 border border-gold-primary/10 px-6 py-4 rounded-2xl outline-none focus:border-gold-primary text-white" placeholder="Username">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-black text-gold-primary uppercase tracking-[0.2em] ml-2">Access Key</label>
                                <input type="password" id="password" class="w-full bg-slate-950/50 border border-gold-primary/10 px-6 py-4 rounded-2xl outline-none focus:border-gold-primary text-white" placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn-gold w-full py-5 rounded-2xl text-xs tracking-[0.2em] mt-4">Unlock System</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
        }

        function renderDashboard() {
            if (!state.currentUser) return renderLogin();
            if (state.currentUser.role === 'admin') renderAdminDashboard();
            else renderGuruDashboard();
        }

        // --- ADMIN DASHBOARD ---
        function renderAdminDashboard() {
            const today = new Date().toLocaleDateString('id-ID');
            const logs = state.attendance.filter(a => a.date === today);

            app.innerHTML = `
                <nav class="premium-card sticky top-4 z-[100] mx-4 my-6 px-6 py-4 flex justify-between items-center bg-slate-950/90">
                    <div class="flex items-center gap-3">
                        <div class="h-8 w-8 gold-gradient rounded-lg flex items-center justify-center text-midnight"><i class="fas fa-gem text-xs"></i></div>
                        <h2 class="font-serif text-gold text-lg hidden sm:block">ADMIN PANEL</h2>
                    </div>
                    <div class="flex bg-slate-900/50 p-1 rounded-xl border border-gold-primary/10">
                        <button onclick="state.adminActiveTab='overview'; renderAdminDashboard()" class="px-4 py-2 rounded-lg text-[9px] font-bold ${state.adminActiveTab === 'overview' ? 'tab-active' : 'text-slate-500'}">OVERVIEW</button>
                        <button onclick="state.adminActiveTab='activity'; renderAdminDashboard()" class="px-4 py-2 rounded-lg text-[9px] font-bold ${state.adminActiveTab === 'activity' ? 'tab-active' : 'text-slate-500'}">FEED</button>
                        <button onclick="state.adminActiveTab='accounts'; renderAdminDashboard()" class="px-4 py-2 rounded-lg text-[9px] font-bold ${state.adminActiveTab === 'accounts' ? 'tab-active' : 'text-slate-500'}">USERS</button>
                    </div>
                    <button onclick="logout()" class="text-rose-400 p-2"><i class="fas fa-power-off"></i></button>
                </nav>

                <main class="px-6 pb-20 max-w-7xl mx-auto">
                    ${state.adminActiveTab === 'overview' ? renderAdminOverview(logs, today) : ''}
                    ${state.adminActiveTab === 'activity' ? renderAdminActivity(logs) : ''}
                    ${state.adminActiveTab === 'accounts' ? renderAdminAccounts() : ''}
                </main>
            `;
        }

        function renderAdminOverview(logs, today) {
            return `
                <div class="animate-content space-y-8">
                    <div class="flex flex-col sm:flex-row justify-between items-end gap-4">
                        <div>
                            <h3 class="text-3xl font-serif text-white">Mainframe Status</h3>
                            <p class="text-gold-primary/60 text-[9px] font-black tracking-[0.2em] uppercase mt-1">Registry: ${today}</p>
                        </div>
                        <button onclick="downloadPDF()" class="btn-gold px-6 py-4 rounded-xl text-[9px]">Export Report</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="premium-card p-8">
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-2">Total Guru</p>
                            <h4 class="text-4xl font-serif text-white">${state.users.filter(u=>u.role==='guru').length}</h4>
                        </div>
                        <div class="premium-card p-8 border-l-2 border-l-emerald-500/50">
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-2">Hadir Hari Ini</p>
                            <h4 class="text-4xl font-serif text-emerald-400">${logs.filter(l=>l.type==='Hadir').length}</h4>
                        </div>
                        <div class="premium-card p-8 border-l-2 border-l-amber-500/50">
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-2">Izin/Sakit</p>
                            <h4 class="text-4xl font-serif text-amber-400">${logs.filter(l=>l.type!=='Hadir').length}</h4>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminActivity(logs) {
            return `
                <div class="animate-content space-y-6">
                    <h3 class="text-2xl font-serif text-gold">Real-time Feed</h3>
                    <div class="premium-card overflow-hidden">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="w-full text-left">
                                <thead class="bg-slate-950 text-gold-primary text-[9px] font-black uppercase">
                                    <tr>
                                        <th class="px-8 py-5">Personnel</th>
                                        <th class="px-8 py-5">Status</th>
                                        <th class="px-8 py-5">Time</th>
                                        <th class="px-8 py-5">Note</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-white/5 text-xs">
                                    ${logs.length ? logs.map(l => `
                                        <tr>
                                            <td class="px-8 py-4 font-bold">${l.name}</td>
                                            <td class="px-8 py-4"><span class="px-3 py-1 rounded-full border border-gold-primary/20 text-[9px]">${l.type}</span></td>
                                            <td class="px-8 py-4 font-mono">${l.time}</td>
                                            <td class="px-8 py-4 text-slate-400">${l.note}</td>
                                        </tr>
                                    `).join('') : `<tr><td colspan="4" class="p-20 text-center text-slate-600">No activity recorded today</td></tr>`}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminAccounts() {
            return `
                <div class="animate-content grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="premium-card p-8 h-fit">
                        <h4 class="text-gold font-serif text-lg mb-6">Register New Personnel</h4>
                        <form onsubmit="handleCreateUser(event)" class="space-y-4">
                            <input type="text" id="newName" placeholder="Nama Lengkap" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-xs outline-none focus:border-gold-primary" required>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="newUsername" placeholder="Username" class="bg-slate-900 border border-white/10 p-4 rounded-xl text-xs outline-none focus:border-gold-primary" required>
                                <input type="password" id="newPassword" placeholder="Pin/Password" class="bg-slate-900 border border-white/10 p-4 rounded-xl text-xs outline-none focus:border-gold-primary" required>
                            </div>
                            <button type="submit" class="btn-gold w-full py-4 rounded-xl text-[9px]">Authorize Account</button>
                        </form>
                    </div>
                    <div class="premium-card p-8 h-[500px] overflow-y-auto custom-scrollbar">
                        <h4 class="text-white font-serif text-lg mb-6">Account Registry</h4>
                        <div class="space-y-4">
                            ${state.users.filter(u=>u.role==='guru').map(u => `
                                <div class="flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-white/5">
                                    <div>
                                        <p class="text-xs font-bold">${u.name}</p>
                                        <p class="text-[8px] text-slate-500 uppercase tracking-widest mt-1">@${u.username} • PIN: ${u.password}</p>
                                    </div>
                                    <button onclick="deleteUser('${u.id}')" class="text-rose-500/50 hover:text-rose-500"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function handleCreateUser(e) {
            e.preventDefault();
            const u = {
                id: 'guru_' + Date.now(),
                name: document.getElementById('newName').value,
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                role: 'guru',
                targetLat: -6.2088,
                targetLng: 106.8456,
                radius: 100
            };
            state.users.push(u);
            saveState();
            notify('User Terdaftar');
            renderAdminDashboard();
        }

        function deleteUser(id) {
            state.users = state.users.filter(u => u.id !== id);
            saveState();
            notify('User Dihapus', 'error');
            renderAdminDashboard();
        }

        // --- GURU DASHBOARD ---
        function renderGuruDashboard() {
            const user = state.currentUser;
            const today = new Date().toLocaleDateString('id-ID');
            const hasChecked = state.attendance.some(a => a.userId === user.id && a.date === today);
            const myLogs = state.attendance.filter(a => a.userId === user.id);

            app.innerHTML = `
                <div class="p-6 max-w-lg mx-auto min-h-screen flex flex-col gap-8">
                    <header class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 gold-gradient rounded-2xl flex items-center justify-center text-midnight shadow-lg"><i class="fas fa-user-check"></i></div>
                            <div>
                                <h2 class="text-lg font-bold">${user.name}</h2>
                                <p class="text-[8px] text-gold-primary uppercase tracking-[0.2em] font-black">Official Personnel</p>
                            </div>
                        </div>
                        <button onclick="logout()" class="w-10 h-10 rounded-xl bg-slate-900 border border-white/10 text-rose-400"><i class="fas fa-sign-out-alt"></i></button>
                    </header>

                    <section class="premium-card p-10 text-center animate-content">
                        <div class="w-20 h-20 bg-slate-950 border border-gold-primary/20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                            <i class="fas fa-location-dot text-3xl text-gold"></i>
                        </div>
                        <h3 class="text-2xl font-serif text-white mb-2">Presensi Digital</h3>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-10">Verification Zone: Main Building</p>

                        ${!hasChecked ? `
                            <div class="space-y-4">
                                <button onclick="processAbsensi('Hadir')" class="btn-gold w-full py-6 rounded-2xl text-[11px] flex items-center justify-center gap-3">
                                    <i class="fas fa-fingerprint text-xl"></i> Verifikasi Kehadiran
                                </button>
                                <div class="grid grid-cols-2 gap-4">
                                    <button onclick="showAbsenModal('Izin')" class="py-4 bg-slate-900/50 border border-white/5 rounded-2xl text-[9px] font-bold text-slate-300">IZIN</button>
                                    <button onclick="showAbsenModal('Sakit')" class="py-4 bg-slate-900/50 border border-white/5 rounded-2xl text-[9px] font-bold text-slate-300">SAKIT</button>
                                </div>
                            </div>
                        ` : `
                            <div class="bg-emerald-500/10 border border-emerald-500/20 p-8 rounded-3xl">
                                <i class="fas fa-circle-check text-4xl text-emerald-400 mb-3"></i>
                                <h4 class="text-emerald-400 font-serif text-lg uppercase tracking-widest">Verified</h4>
                                <p class="text-[8px] text-slate-500 uppercase mt-2">Data berhasil dikirim ke server</p>
                            </div>
                        `}
                    </section>

                    <section class="space-y-4">
                        <p class="text-[9px] font-black text-gold-primary uppercase tracking-[0.3em] px-2">Recent Records</p>
                        <div class="space-y-3">
                            ${myLogs.slice(-5).reverse().map(l => `
                                <div class="premium-card p-5 flex justify-between items-center text-xs">
                                    <div>
                                        <p class="font-bold">${l.date}</p>
                                        <p class="text-[8px] text-slate-500 mt-1 uppercase">${l.type}</p>
                                    </div>
                                    <span class="font-mono text-[10px] bg-slate-900 px-3 py-1 rounded-lg border border-white/5">${l.time}</span>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                </div>
            `;
        }

        // --- ACTIONS ---
        function processAbsensi(type, note = '-') {
            const user = state.currentUser;
            
            if (type === 'Hadir') {
                notify('Mencari Sinyal Satelit...', 'success');
                navigator.geolocation.getCurrentPosition((pos) => {
                    const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, user.targetLat, user.targetLng);
                    if (dist > user.radius) {
                        return notify('Radius Ilegal: Harap masuk ke area sekolah', 'error');
                    }
                    finalizeAbsen(type, note);
                }, (err) => {
                    notify('Akses Lokasi Dibutuhkan', 'error');
                });
            } else {
                finalizeAbsen(type, note);
            }
        }

        function finalizeAbsen(type, note) {
            const now = new Date();
            const log = {
                id: Date.now(),
                userId: state.currentUser.id,
                name: state.currentUser.name,
                type: type,
                time: now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                date: now.toLocaleDateString('id-ID'),
                note: note
            };
            state.attendance.push(log);
            saveState();
            notify('Presensi Berhasil Diverifikasi');
            renderDashboard();
        }

        function showAbsenModal(type) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 z-[1100] modal-overlay flex items-center justify-center p-6';
            overlay.innerHTML = `
                <div class="premium-card p-8 w-full max-w-sm border-t-2 border-t-gold-primary animate-content">
                    <h3 class="text-xl font-serif text-gold mb-2">Formulir ${type}</h3>
                    <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-6">Harap berikan alasan yang valid</p>
                    <textarea id="noteText" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-xs h-32 outline-none focus:border-gold-primary text-white" placeholder="Tulis alasan di sini..."></textarea>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <button onclick="this.closest('.fixed').remove()" class="py-4 rounded-xl text-[9px] font-bold text-slate-500 border border-white/10">BATAL</button>
                        <button id="confirmBtn" class="btn-gold py-4 rounded-xl text-[9px]">KIRIM DATA</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('confirmBtn').onclick = () => {
                const note = document.getElementById('noteText').value || 'Tanpa Keterangan';
                processAbsensi(type, note);
                overlay.remove();
            };
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const today = new Date().toLocaleDateString('id-ID');
            const data = state.attendance.filter(a => a.date === today);

            doc.setFontSize(18);
            doc.setTextColor(153, 101, 21);
            doc.text("SMP NEGERI 4 MONTA - EXCLUSIVE REPORT", 105, 20, { align: "center" });
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Generated on: ${today} • System: Elite v4.0`, 105, 28, { align: "center" });

            const rows = data.map((r, i) => [i + 1, r.name, r.type, r.time, r.note]);
            doc.autoTable({
                startY: 40,
                head: [['No', 'Personnel', 'Status', 'Timestamp', 'Statement']],
                body: rows,
                headStyles: { fillColor: [153, 101, 21], textColor: [255, 255, 255], fontStyle: 'bold' },
                styles: { fontSize: 9 }
            });

            doc.save(`Elite_Report_${today}.pdf`);
            notify("Laporan Terenkripsi Diunduh");
        }

        // --- INIT ---
        window.onload = () => {
            if (state.currentUser) renderDashboard();
            else renderLogin();
        };

    </script>
</body>
</html>
